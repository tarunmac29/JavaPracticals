<!DOCTYPE html>
<html>
<head>
    <title>Send User Info</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .input-group { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>User Registration</h2>
    <div class="input-group">
        <label>Name:</label> <input type="text" id="userName">
    </div>
    <div class="input-group">
        <label>Email:</label> <input type="email" id="userEmail">
    </div>
    <button onclick="sendData()">Register User</button>

    <p id="responseMsg"></p>

    <script>
    async function sendData() {
        const userInfo = {
            name: document.getElementById('userName').value,
            email: document.getElementById('userEmail').value
        };

        try {
            const response = await fetch('UserServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userInfo)
            });

            const result = await response.text();
            document.getElementById('responseMsg').innerText = "Server says: " + result;
        } catch (error) {
            console.error('Error:', error);
        }
    }
    </script>
</body>
</html>
